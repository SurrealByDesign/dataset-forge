[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "dataset-forge"
version = "0.27.0a0"
description = "Dataset Forge v0.27.0-alpha -- a read-only LoRA dataset curation workstation with internal review signal policy resolution, Analyzer Descriptors, Dataset Intelligence, manifest-aware comparison, Inspection Manifest provenance, local Review Desk, inspect, review, improvement planning, and preview workflows."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "Pillow>=10.0",
    "opencv-python>=4.10",
]

[project.scripts]
dataset-forge = "dataset_forge.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dataset_forge = ["config/*.json"]

[dependency-groups]
dev = [
    "pytest>=9.1.0",
]
