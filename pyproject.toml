[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "dataset-forge"
version = "0.20.0a0"
description = "Dataset Forge v0.20.0-alpha -- a LoRA Dataset Decision Engine with a local browser Review Desk for real-world triage evidence, inspect, review, comparison, improvement planning, and preview workflows."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "Pillow>=10.0",
    "opencv-python>=4.10",
]

[project.scripts]
dataset-forge = "dataset_forge.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dataset_forge = ["config/*.json"]

[dependency-groups]
dev = [
    "pytest>=9.1.0",
]
